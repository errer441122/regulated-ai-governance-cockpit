services:
  api:
    build: .
    command: uvicorn src.api:app --host 0.0.0.0 --port 8080
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MINIO_ENDPOINT: http://minio:9000
      INFLUX_URL: http://influxdb:8086
    depends_on:
      - mlflow
      - minio
      - influxdb

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.11.1
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:////mlflow/mlflow.db --default-artifact-root s3://portfolio-mlflow/
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - mlflow-data:/mlflow

  minio:
    image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in production-sim-stack/.env}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in production-sim-stack/.env}"
    volumes:
      - minio-data:/data

  influxdb:
    image: influxdb:2.7
    ports:
      - "127.0.0.1:8086:8086"
    volumes:
      - influx-data:/var/lib/influxdb2

  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./grafana:/var/lib/grafana/dashboards
    depends_on:
      - influxdb

volumes:
  mlflow-data:
  minio-data:
  influx-data:
